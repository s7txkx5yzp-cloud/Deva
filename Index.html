<!DOCTYPE html>
<html>
<head>
  <title>Login / Signup</title>

  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }

    .box {
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
      width: 280px;
    }

    input {
      width: 100%;
      margin: 8px 0;
      padding: 8px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 5px;
    }

    .error {
      color: red;
      margin-top: 10px;
      font-size: 13px;
    }

    .success {
      color: green;
      margin-top: 10px;
      font-size: 13px;
    }

    .switch {
      margin-top: 10px;
      font-size: 12px;
      cursor: pointer;
      color: #007bff;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="box">

  <h3 id="title">Login</h3>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="handleAction()" id="btn">Login</button>

  <div class="error" id="error"></div>
  <div class="success" id="success"></div>

  <div class="switch" onclick="toggleMode()">
    Switch to Create Account
  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwRRIzSvjFH7n-bTfOcqRBoHSeqdZh-LYD5Ss5ubPI78rkUpWbhiiwLXSo2khdXyrD4mQ/exec";

let mode = "login"; // login or create

function toggleMode() {
  mode = (mode === "login") ? "create" : "login";

  document.getElementById("title").innerText =
    (mode === "login") ? "Login" : "Create Account";

  document.getElementById("btn").innerText =
    (mode === "login") ? "Login" : "Create User";

  document.querySelector(".switch").innerText =
    (mode === "login") ? "Switch to Create Account" : "Switch to Login";

  clearMessages();
}

function handleAction() {
  clearMessages();

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const action = (mode === "login") ? "login" : "create";

  const url =
    API_URL +
    "?action=" + action +
    "&username=" + encodeURIComponent(username) +
    "&password=" + encodeURIComponent(password);

  fetch(url)
    .then(res => res.json())
    .then(data => {

      if (data.success) {

        if (mode === "login") {
          window.location.href = "success.html";
        } else {
          document.getElementById("success").innerText =
            data.message || "User created successfully";
        }

      } else {
        document.getElementById("error").innerText =
          data.message || "Something went wrong";
      }

    })
    .catch(() => {
      document.getElementById("error").innerText =
        "Server error";
    });
}

function clearMessages() {
  document.getElementById("error").innerText = "";
  document.getElementById("success").innerText = "";
}

</script>

</body>
</html>
